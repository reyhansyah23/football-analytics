# version: '3.8'

services:
  etl:
      build: ./etl
      container_name: pl_etl
      volumes:
        - ./etl:/app
      env_file:
        - .env
      depends_on:
        - postgres
        
  postgres:
    image: postgres:16
    container_name: pl_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  dbt:
      build: ./dbt
      container_name: pl_dbt
      volumes:
        - ./dbt:/usr/app/dbt
      environment:
        - DBT_PROFILES_DIR=/usr/app/dbt
      depends_on:
        - postgres

volumes:
  postgres_data: