version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: football
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: .
    container_name: etl-job
    # depends_on:
    #   - mysql
    env_file:
      - .env
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy

  # metabase:
  #   image: metabase/metabase
  #   container_name: metabase
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - mysql

volumes:
  mysql_data: